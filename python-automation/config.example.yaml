# ---------------------------------------------------------------------------
# Selectel Mobile Farm — IAM authentication
# ---------------------------------------------------------------------------
# Mobile Farm requires IAM tokens, NOT static API keys.
# Docs: https://docs.selectel.ru/api/authorization/
#
# How to find these values:
#   selectel_username:   Control panel → Account → Users → Service Users → name
#   selectel_account_id: Shown in the top-right corner of my.selectel.ru
#   selectel_password:   Service user password (set when creating the user)
#
# Env var equivalents:
#   MLBB_SELECTEL_USERNAME, MLBB_SELECTEL_ACCOUNT_ID, MLBB_SELECTEL_PASSWORD
selectel_username: "user-xxxxxxxx"
selectel_account_id: "12345678"
selectel_password: "your-service-user-password"
selectel_api_url: "https://mf.selectel.ru/api/v1"

# Proxy (optional — only needed if mf.selectel.ru is blocked from your network)
# Supported: http://user:pass@host:port  or  socks5://user:pass@host:1080
# Env: MLBB_PROXY_URL
proxy_url: null

# ---------------------------------------------------------------------------
# ADB connection — required for Selectel Mobile Farm
# ---------------------------------------------------------------------------
# Selectel devices are accessed via ADB over TCP, not a farm-hosted Appium URL.
# Docs: https://docs.selectel.ru/mobile-farm/manage/connect-to-device-with-adb/
#
# Setup steps:
#   1. Generate your ADB key pair (once):
#        python -m mlbb_automation setup-adb
#   2. Copy the printed QAAAA... public key
#   3. Add it in Selectel: Control Panel → Account → Access → ADB Keys
#   4. Run: python -m mlbb_automation check   (verifies key + connectivity)
#
# The adb_host below is the Selectel ADB relay — leave as-is.
# The port is assigned per-device by the farm when you reserve it.
adb_host: "adb.mobfarm.selectel.ru"
adb_key_path: "~/.android/adbkey"   # path to ADB private key

# Local Appium server URL (Appium must be running on this machine)
# Install Appium: npm install -g appium && appium driver install uiautomator2
local_appium_url: "http://localhost:4723"

# ---------------------------------------------------------------------------
# Google account credentials (no 2FA required)
# ---------------------------------------------------------------------------
google_email: "your-email@gmail.com"
google_password: "your-password"

# Device unlock PIN for Google Pay authentication (optional).
# Required only if the device shows a PIN prompt after tapping the Pay button.
# If not set, biometric/PIN prompts are cancelled and the flow continues.
# Can also be set via: MLBB_PAYMENT_PIN=1234
payment_pin: null

# Device filter preferences (optional — leave null for any available device)
device_filter:
  platform_version: "11"   # Android version (e.g. "11", "12", "13")
  device_model: null        # e.g. "Samsung Galaxy S21", or null for any

# Appium URL override (optional — leave null to use local_appium_url above)
appium_url: null

# Retry and timeout settings
retry_count: 3
retry_delay_seconds: 2.0
action_timeout_seconds: 30
session_timeout_minutes: 60

# Logging and artifact storage
log_dir: "./run_artifacts"
log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR
save_screenshots_on_error: true
save_all_screenshots: false  # true = screenshot after every action (verbose)
